<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corso Birra Avanzato - ITALIAN BEER SCHOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        /* RESET E STILI BASE */
        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background: url('sfondobichiere.jpg') no-repeat center center fixed;
            background-size: cover; color: #fff; overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        
        .overlay {
            display: flex; flex-direction: column; min-height: 100vh;
            background-color: rgba(0, 0, 0, 0.75); position: relative; z-index: 1;
        }

        /* HEADER - UNIFORMATO A WSET (Altezza 70px) */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(0, 0, 0, 0.85); padding: 15px 20px;
            position: relative; z-index: 10; min-height: 70px;
        }
        .logo-container { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        .logo-container img { height: 70px; display: block; }
        .nav-right { z-index: 15; }
        .ig-link { font-size: 1.5em; color: #fff; }

        .hamburger-menu {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px; width: 30px; z-index: 15;
        }
        .hamburger-menu .line { width: 30px; height: 3px; background-color: #fff; border-radius: 5px; }

        /* MENU LATERALE */
        .menu-pop-up {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); padding-top: 80px;
            transition: left 0.3s ease-in-out; z-index: 14; display: flex; flex-direction: column;
        }
        .menu-pop-up.open { left: 0; }
        .menu-pop-up a { padding: 12px 25px; font-size: 1.1em; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .menu-pop-up a.sub-menu { padding-left: 45px; font-size: 0.9em; color: #e0ac4c; border-bottom: none; display: flex; align-items: center; gap: 8px; }
        .flag-rect { width: 20px; }

        /* CONTENUTO */
        .content { flex: 1; padding: 15px; max-width: 1200px; margin: 0 auto; }

        .page-header-wrapper { margin-bottom: 15px; }
        h1 { color: #e0ac4c; font-size: 1.8em; text-transform: uppercase; margin: 0; }

        .main-container { display: flex; flex-direction: column; gap: 20px; }

        /* COLONNA DESTRA (Immagine e Info) */
        .img-column { order: 1; display: flex; flex-direction: column; align-items: center; }
        .main-course-img { width: 100%; max-width: 380px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }

        .tech-info { 
            margin-top: 15px; padding: 12px 18px; 
            border-left: 4px solid #e0ac4c; background: rgba(0,0,0,0.4); 
            border-radius: 0 10px 10px 0; width: 100%; max-width: 380px; 
            box-sizing: border-box; font-size: 0.9em; text-align: left;
        }
        .tech-info p { margin: 5px 0; }
        .tech-info strong { color: #e0ac4c; }

        .stripe-container { width: 100%; max-width: 380px; margin-top: 10px; }

        /* COLONNA SINISTRA (Testo) */
        .text-column { order: 2; font-size: 1em; line-height: 1.6; font-weight: 300; color: #eee; }
        
        /* BOX DELLE SERATE COMPATTI */
        .boxes {
            display: flex; flex-wrap: wrap; justify-content: flex-start;
            gap: 12px; margin-top: 25px;
        }
        .box {
            width: 220px; padding: 12px; background-color: rgba(255, 255, 255, 0.08);
            border: 1px dashed rgba(255,255,255,0.4); border-radius: 15px 50px 15px 50px;
        }
        .box h2 { font-size: 0.9em; margin-bottom: 8px; color: #e0ac4c; text-transform: uppercase; }
        .box ul { list-style-type: none; padding: 0; font-size: 0.85em; margin: 0; }
        .box ul li { margin: 5px 0; position: relative; padding-left: 12px; line-height: 1.3; }
        .box ul li::before { content: "•"; position: absolute; left: 0; color: #e0ac4c; }

        /* PULSANTE SECONDARIO SOLO MOBILE */
        .mobile-buy-bottom { display: none; margin: 30px 0; text-align: center; }

        /* PC LAYOUT */
        @media screen and (min-width: 900px) {
            h1 { font-size: 2.5em; text-align: left; }
            .content { padding-top: 10px; }
            .main-container { flex-direction: row; align-items: flex-start; }
            .text-column { flex: 1.3; order: 1; }
            .img-column { flex: 1; order: 2; position: sticky; top: 15px; }
        }

        /* MOBILE LAYOUT */
        @media screen and (max-width: 899px) {
            .boxes { justify-content: center; }
            .box { width: 45%; min-width: 140px; }
            .mobile-buy-bottom { display: block; }
        }

        .footer { background: rgba(0, 0, 0, 0.85); text-align: center; padding: 15px; font-size: 0.8em; margin-top: auto; }
    </style>
    <script async src="https://js.stripe.com/v3/buy-button.js"></script>
</head>
